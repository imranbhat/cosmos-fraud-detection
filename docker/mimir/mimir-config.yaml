# =============================================================================
# Grafana Mimir Configuration
# Cosmos Fraud Detection – Local Development
#
# Receives metrics via Prometheus remote write from the OTel Collector
# and span-metrics from Tempo. Single-node monolithic mode.
# =============================================================================

multitenancy_enabled: false

server:
  http_listen_port: 9009
  grpc_listen_port: 9095
  log_level: info

common:
  storage:
    backend: filesystem
    filesystem:
      dir: /tmp/mimir/data

ingester:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist
    replication_factor: 1

store_gateway:
  sharding_ring:
    replication_factor: 1

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /tmp/mimir/blocks
  tsdb:
    dir: /tmp/mimir/tsdb
    retention_period: 48h

compactor:
  data_dir: /tmp/mimir/compactor
  sharding_ring:
    kvstore:
      store: memberlist

limits:
  native_histograms_ingestion_enabled: true
  max_global_series_per_user: 0    # Unlimited for dev
  ingestion_rate: 50000
  ingestion_burst_size: 100000

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /tmp/mimir/rules

activity_tracker:
  filepath: /tmp/mimir/activity.log

analytics:
  reporting_enabled: false
