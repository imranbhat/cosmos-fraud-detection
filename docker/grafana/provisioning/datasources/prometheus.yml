# =============================================================================
# Grafana – Auto-provisioned Datasources
# Cosmos Fraud Detection – Local Development
# =============================================================================

apiVersion: 1

datasources:

  # --------------------------------------------------------------------------
  # Prometheus – primary metrics datasource
  # --------------------------------------------------------------------------
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: prometheus-uid
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: "15s"
      # Enable Prometheus query exemplars (links to Jaeger traces)
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: jaeger-uid
          urlDisplayLabel: View in Jaeger

  # --------------------------------------------------------------------------
  # Jaeger – distributed tracing datasource
  # --------------------------------------------------------------------------
  - name: Jaeger
    type: jaeger
    access: proxy
    uid: jaeger-uid
    url: http://jaeger:16686
    isDefault: false
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: ""
      nodeGraph:
        enabled: true
