# =============================================================================
# Prometheus Configuration – Cosmos Fraud Detection
# =============================================================================

global:
  scrape_interval: 15s          # Default scrape interval for all jobs
  evaluation_interval: 15s      # Rule evaluation interval
  scrape_timeout: 10s
  external_labels:
    environment: local
    project: cosmos-fraud-detection

# ---------------------------------------------------------------------------
# Alerting (placeholder – connect to Alertmanager when needed)
# ---------------------------------------------------------------------------
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

# ---------------------------------------------------------------------------
# Rule files (add recording/alerting rules here)
# ---------------------------------------------------------------------------
rule_files:
  # - "rules/*.yml"

# ---------------------------------------------------------------------------
# Scrape Configurations
# ---------------------------------------------------------------------------
scrape_configs:

  # --------------------------------------------------------------------------
  # Prometheus self-monitoring
  # --------------------------------------------------------------------------
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # --------------------------------------------------------------------------
  # API Gateway – port 8080
  # --------------------------------------------------------------------------
  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - gateway:8080
        labels:
          service: gateway

  # --------------------------------------------------------------------------
  # Ingestion Service – port 8081
  # --------------------------------------------------------------------------
  - job_name: ingestion-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - ingestion-service:8081
        labels:
          service: ingestion-service

  # --------------------------------------------------------------------------
  # Feature Store – port 8082
  # --------------------------------------------------------------------------
  - job_name: feature-store
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - feature-store:8082
        labels:
          service: feature-store

  # --------------------------------------------------------------------------
  # Scoring Service – port 8083
  # --------------------------------------------------------------------------
  - job_name: scoring-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - scoring-service:8083
        labels:
          service: scoring-service

  # --------------------------------------------------------------------------
  # 3DS Service – port 8084
  # --------------------------------------------------------------------------
  - job_name: threeds-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - threeds-service:8084
        labels:
          service: threeds-service

  # --------------------------------------------------------------------------
  # Audit Service – port 8085
  # --------------------------------------------------------------------------
  - job_name: audit-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - audit-service:8085
        labels:
          service: audit-service
