{{- if .Values.externalSecrets.enabled }}
{{/*
  ExternalSecret CRDs for all services.
  Requires: https://external-secrets.io/
  Install: helm install external-secrets external-secrets/external-secrets
*/}}

# Ingestion service secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-ingestion-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cosmos-fraud-detection.serviceLabels" (list . "ingestion-service") | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ .Release.Name }}-ingestion-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: db-password
      remoteRef:
        key: cosmos/{{ .Values.global.env }}/ingestion
        property: db-password
    - secretKey: kafka-sasl-password
      remoteRef:
        key: cosmos/{{ .Values.global.env }}/kafka
        property: sasl-password

