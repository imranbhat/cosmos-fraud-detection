apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-feature-store
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cosmos-fraud-detection.serviceLabels" (list . "feature-store-service") | nindent 4 }}
spec:
  replicas: {{ .Values.featureStore.replicaCount }}
  selector:
    matchLabels:
      {{- include "cosmos-fraud-detection.serviceSelectorLabels" (list . "feature-store-service") | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "cosmos-fraud-detection.serviceLabels" (list . "feature-store-service") | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.featureStore.port | quote }}
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: {{ .Release.Name }}-feature-store
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
        - name: feature-store-service
          image: {{ include "cosmos-fraud-detection.image" (list . .Values.featureStore.image) }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.featureStore.port }}
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.global.env | quote }}
            - name: SERVER_PORT
              value: {{ .Values.featureStore.port | quote }}
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-redis-config
                  key: host
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-redis-config
                  key: port
            - name: SCYLLA_CONTACT_POINTS
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-scylla-config
                  key: contact-points
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-feature-store-secrets
                  key: redis-password
            - name: SCYLLA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-feature-store-secrets
                  key: scylla-password
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 20
          resources:
            {{- toYaml .Values.featureStore.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "cosmos-fraud-detection.serviceSelectorLabels" (list . "feature-store-service") | nindent 20 }}
                topologyKey: kubernetes.io/hostname
