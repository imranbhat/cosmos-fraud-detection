{{/*
  Flink stream processor using the Flink Kubernetes Operator CRD.
  Requires: https://nightlies.apache.org/flink/flink-kubernetes-operator-docs-stable/
  Install CRDs: helm install flink-kubernetes-operator flink-operator-repo/flink-kubernetes-operator
*/}}
apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: {{ .Release.Name }}-stream-processor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cosmos-fraud-detection.serviceLabels" (list . "stream-processor") | nindent 4 }}
spec:
  image: {{ include "cosmos-fraud-detection.image" (list . .Values.streamProcessor.image) }}
  flinkVersion: v1_18
  flinkConfiguration:
    taskmanager.numberOfTaskSlots: {{ .Values.streamProcessor.taskManager.taskSlots | quote }}
    state.backend: rocksdb
    state.backend.incremental: "true"
    execution.checkpointing.interval: "30s"
    execution.checkpointing.mode: EXACTLY_ONCE
    execution.checkpointing.min-pause: "10s"
    execution.checkpointing.timeout: "5min"
    restart-strategy: exponential-delay
    restart-strategy.exponential-delay.initial-backoff: "1s"
    restart-strategy.exponential-delay.max-backoff: "5min"
    restart-strategy.exponential-delay.backoff-multiplier: "2.0"
    metrics.reporters: prometheus
    metrics.reporter.prometheus.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
    metrics.reporter.prometheus.port: "9249"
  serviceAccount: {{ .Release.Name }}-stream-processor
  podTemplate:
    metadata:
      labels:
        {{- include "cosmos-fraud-detection.serviceLabels" (list . "stream-processor") | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9249"
        prometheus.io/path: "/"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 9999
        fsGroup: 9999
      containers:
        - name: flink-main-container
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-kafka-config
                  key: bootstrap.servers
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-redis-config
                  key: host
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-stream-processor-secrets
                  key: kafka-sasl-password
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
  jobManager:
    resource:
      {{- toYaml .Values.streamProcessor.jobManager.resources | nindent 6 }}
    replicas: {{ .Values.streamProcessor.jobManager.replicaCount }}
    podTemplate:
      spec:
        containers:
          - name: flink-main-container
            resources:
              {{- toYaml .Values.streamProcessor.jobManager.resources | nindent 14 }}
  taskManager:
    resource:
      {{- toYaml .Values.streamProcessor.taskManager.resources | nindent 6 }}
    replicas: {{ .Values.streamProcessor.taskManager.replicaCount }}
    podTemplate:
      spec:
        containers:
          - name: flink-main-container
            resources:
              {{- toYaml .Values.streamProcessor.taskManager.resources | nindent 14 }}
  job:
    jarURI: local:///opt/flink/usrlib/cosmos-stream-processor.jar
    entryClass: io.cosmos.fraud.stream.FraudDetectionStreamJob
    args:
      - "--kafka.bootstrap.servers=$(KAFKA_BOOTSTRAP_SERVERS)"
      - "--redis.host=$(REDIS_HOST)"
    parallelism: {{ mul .Values.streamProcessor.taskManager.replicaCount .Values.streamProcessor.taskManager.taskSlots }}
    upgradeMode: stateless
    state: running
