{{- if .Values.gateway.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cosmos-fraud-detection.serviceLabels" (list . "api-gateway") | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.gateway.ingress.className | quote }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    {{- with .Values.gateway.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.gateway.ingress.className }}
  {{- if .Values.gateway.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.gateway.ingress.host | quote }}
      secretName: {{ .Values.gateway.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.gateway.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-gateway
                port:
                  name: http
{{- end }}
