{{- if and .Values.monitoring.enabled .Values.monitoring.grafana.dashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-grafana-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cosmos-fraud-detection.labels" . | nindent 4 }}
    {{ .Values.monitoring.grafana.dashboards.label }}: {{ .Values.monitoring.grafana.dashboards.labelValue | quote }}
data:
  cosmos-fraud-detection.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Cosmos Fraud Detection Platform - Operations Dashboard",
      "editable": true,
      "gnetId": null,
      "graphTooltip": 1,
      "id": null,
      "iteration": 1711584000000,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "Throughput",
          "type": "row"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "id": 2,
          "options": { "legend": { "displayMode": "table", "placement": "bottom" } },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{namespace=\"{{ .Release.Namespace }}\"}[1m])) by (service)",
              "legendFormat": "{{ "{{service}}" }}",
              "refId": "A"
            }
          ],
          "title": "Requests per Second (TPS) by Service",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5000 },
                  { "color": "red", "value": 10000 }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "id": 3,
          "options": { "orientation": "horizontal", "reduceOptions": { "calcs": ["last"] } },
          "targets": [
            {
              "expr": "sum(kafka_consumergroup_lag{namespace=\"{{ .Release.Namespace }}\"}) by (consumergroup, topic)",
              "legendFormat": "{{ "{{consumergroup}} / {{topic}}" }}",
              "refId": "A"
            }
          ],
          "title": "Kafka Consumer Lag",
          "type": "bargauge"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 10,
          "title": "Scoring Latency",
          "type": "row"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.05 },
                  { "color": "red", "value": 0.1 }
                ]
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 10 },
          "id": 11,
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_server_requests_seconds_bucket{service=\"{{ .Release.Name }}-scoring\", namespace=\"{{ .Release.Namespace }}\", uri=\"/api/v1/score\"}[5m])) by (le))",
              "legendFormat": "P50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{service=\"{{ .Release.Name }}-scoring\", namespace=\"{{ .Release.Namespace }}\", uri=\"/api/v1/score\"}[5m])) by (le))",
              "legendFormat": "P95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket{service=\"{{ .Release.Name }}-scoring\", namespace=\"{{ .Release.Namespace }}\", uri=\"/api/v1/score\"}[5m])) by (le))",
              "legendFormat": "P99",
              "refId": "C"
            }
          ],
          "title": "Scoring Latency Percentiles",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 10 },
          "id": 12,
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket{namespace=\"{{ .Release.Namespace }}\"}[5m])) by (le, service))",
              "legendFormat": "{{ "{{service}}" }} P99",
              "refId": "A"
            }
          ],
          "title": "P99 Latency by Service",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 18 },
          "id": 20,
          "title": "Fraud Decisions",
          "type": "row"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "unit": "percentunit"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 19 },
          "id": 21,
          "targets": [
            {
              "expr": "sum(rate(fraud_decisions_total{namespace=\"{{ .Release.Namespace }}\"}[5m])) by (decision) / sum(rate(fraud_decisions_total{namespace=\"{{ .Release.Namespace }}\"}[5m]))",
              "legendFormat": "{{ "{{decision}}" }}",
              "refId": "A"
            }
          ],
          "title": "Decision Distribution",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.05 },
                  { "color": "red", "value": 0.10 }
                ]
              },
              "unit": "percentunit"
            }
          },
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 19 },
          "id": 22,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["last"] }, "text": {} },
          "targets": [
            {
              "expr": "sum(rate(fraud_decisions_total{decision=\"FRAUD\", namespace=\"{{ .Release.Namespace }}\"}[5m])) / sum(rate(fraud_decisions_total{namespace=\"{{ .Release.Namespace }}\"}[5m]))",
              "legendFormat": "Fraud Rate",
              "refId": "A"
            }
          ],
          "title": "Overall Fraud Rate",
          "type": "gauge"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 19 },
          "id": 23,
          "options": {
            "pieType": "donut",
            "legend": { "displayMode": "table", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "sum(increase(fraud_decisions_total{namespace=\"{{ .Release.Namespace }}\"}[1h])) by (decision)",
              "legendFormat": "{{ "{{decision}}" }}",
              "refId": "A"
            }
          ],
          "title": "Decision Distribution (1h)",
          "type": "piechart"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 27 },
          "id": 30,
          "title": "Error Rate",
          "type": "row"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "unit": "percentunit"
            }
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 28 },
          "id": 31,
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{status=~\"5..\", namespace=\"{{ .Release.Namespace }}\"}[5m])) by (service) / sum(rate(http_server_requests_seconds_count{namespace=\"{{ .Release.Namespace }}\"}[5m])) by (service)",
              "legendFormat": "{{ "{{service}}" }}",
              "refId": "A"
            }
          ],
          "title": "5xx Error Rate by Service",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 36,
      "style": "dark",
      "tags": ["cosmos", "fraud-detection", "platform"],
      "templating": {
        "list": [
          {
            "current": {},
            "datasource": "Prometheus",
            "definition": "label_values(up{namespace=~\"cosmos.*\"}, namespace)",
            "hide": 0,
            "includeAll": false,
            "name": "namespace",
            "options": [],
            "query": "label_values(up{namespace=~\"cosmos.*\"}, namespace)",
            "refresh": 2,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Cosmos Fraud Detection Platform",
      "uid": "cosmos-fraud-detection",
      "version": 1
    }
{{- end }}
