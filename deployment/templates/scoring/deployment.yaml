apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-scoring
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cosmos-fraud-detection.serviceLabels" (list . "scoring-service") | nindent 4 }}
spec:
  replicas: {{ .Values.scoring.replicaCount }}
  selector:
    matchLabels:
      {{- include "cosmos-fraud-detection.serviceSelectorLabels" (list . "scoring-service") | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "cosmos-fraud-detection.serviceLabels" (list . "scoring-service") | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.scoring.port | quote }}
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: {{ .Release.Name }}-scoring
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "cosmos-fraud-detection.serviceSelectorLabels" (list . "scoring-service") | nindent 14 }}
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "cosmos-fraud-detection.serviceSelectorLabels" (list . "scoring-service") | nindent 14 }}
      containers:
        - name: scoring-service
          image: {{ include "cosmos-fraud-detection.image" (list . .Values.scoring.image) }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.scoring.port }}
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.global.env | quote }}
            - name: SERVER_PORT
              value: {{ .Values.scoring.port | quote }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-kafka-config
                  key: bootstrap.servers
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-redis-config
                  key: host
            - name: FEATURE_STORE_URL
              value: http://{{ .Release.Name }}-feature-store/
            - name: MODEL_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-scoring-secrets
                  key: model-secret-key
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-scoring-secrets
                  key: db-password
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          resources:
            {{- toYaml .Values.scoring.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: model-cache
              mountPath: /app/models
      volumes:
        - name: tmp
          emptyDir: {}
        - name: model-cache
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "cosmos-fraud-detection.serviceSelectorLabels" (list . "scoring-service") | nindent 18 }}
              topologyKey: kubernetes.io/hostname
